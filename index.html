<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phonix Parking</title>
    <link rel="stylesheet" href="main.css" type="text/css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</head>
<body>
<!--main header-->
    <div class="header">
        <h1>Phoenix Parking</h1>
        <img onclick="window.location.href = 'settings.html'" src="assets/user-account-icon-for-your-design-only-free-png(1).png" alt="Account Settings" class="icon">
    </div>

<!--    side header-->
    <div id="sidebar" class="sidebar">
        <hr/>

        <!--            filter and report button-->
        <div class="sidebar-section">
            <h3>Report a Ticket</h3>
            <label>Day of Week</label>
            <select id="ticket-day">
                <option>Select a Day</option>
                <option>Monday</option>
                <option>Tuesday</option>
                <option>Wednesday</option>
                <option>Thursday</option>
                <option>Friday</option>
                <option>Saturday</option>
                <option>Sunday</option>
            </select>

            <label>Time</label>
            <input type="time" id="ticket-time">

            <label>Location</label>
            <select id="ticket-location">
                <option>Select a Lot</option>
                <option>Global</option>
                <option>McMichael</option>
                <option>Colonnades</option>
                <option>Historic</option>
                <option>Crest</option>
            </select>

            <button id="submitTicket">Submit</button>
        </div>

        <div class="sidebar-section">
            <h3>Filters</h3>

            <label>Day</label>
            <select id="filter-day">
                <option>Any</option>
                <option>Monday</option>
                <option>Tuesday</option>
                <option>Wednesday</option>
                <option>Thursday</option>
                <option>Friday</option>
            </select>

            <label>Time Range</label>
            <input type="time" id="filter-start">
            <input type="time" id="filter-end">

            <button id="applyFilters">Apply Filters</button>
        </div>
    </div>

<!--    time section-->
<div class="time-container">
    <div id="time-label">Tuesday, 3:22 PM</div>

    <input type="range" id="time-slider" min="0" max="1439" value="842">

    <div class="time-range-labels">
        <span>12:00 AM</span>
        <span>11:59 PM</span>
    </div>
</div>

<!--    for the map to work-->
    <div id="map"></div>

<script src="sidebar_functions.js"></script>
<script src="mapSystem.js"></script>
<script>
    const slider = document.getElementById("time-slider");
    const label = document.getElementById("time-label");

    function minutesToTime(mins) {
        let h = Math.floor(mins / 60);
        let m = mins % 60;
        let ampm = h >= 12 ? "PM" : "AM";
        h = h % 12 || 12;
        m = m.toString().padStart(2, "0");
        return `${h}:${m} ${ampm}`;
    }

    slider.oninput = () => {
        const time = minutesToTime(slider.value);
        label.textContent = `Tuesday, ${time}`;
    };

</script>
</body>
</html>
